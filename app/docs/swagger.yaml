basePath: /api/v1
definitions:
  models.APIInfoResponse:
    properties:
      documentation:
        description: URL to the API documentation
        example: /api/v1/docs
        type: string
      endpoints:
        additionalProperties:
          type: string
        description: Map of available API endpoints
        example:
          submit: POST /api/v1/messages
        type: object
      features:
        additionalProperties:
          type: boolean
        description: Map of enabled features
        example:
          emailNotifications: true
        type: object
      version:
        description: API version
        example: 1.0.0
        type: string
    type: object
  models.HealthCheckResponse:
    properties:
      services:
        additionalProperties:
          type: string
        description: Detailed status of individual components
        example:
          database: healthy
          encryption: healthy
        type: object
      status:
        description: Overall status of the service
        example: healthy
        type: string
      timestamp:
        description: Timestamp of the health check
        type: string
      version:
        description: Service version
        example: 1.0.0
        type: string
    type: object
  models.MessageAccessInfoResponse:
    properties:
      exists:
        description: Whether the message exists and is still available
        example: true
        type: boolean
      expiresAt:
        description: When the message will expire
        type: string
      hasBeenAccessed:
        description: Whether the message has already been accessed
        example: false
        type: boolean
      messageId:
        description: Unique identifier for the message
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      requiresPassphrase:
        description: Whether a passphrase is required to decrypt the message
        example: true
        type: boolean
    type: object
  models.MessageDecryptRequest:
    properties:
      decryptionKey:
        description: Base64 encoded encryption key
        example: YWJjZGVmZ2hpams=
        type: string
      passphrase:
        description: Optional passphrase (required if message is passphrase protected)
        example: correct-horse-battery-staple
        type: string
    required:
    - decryptionKey
    type: object
  models.MessageDecryptResponse:
    properties:
      content:
        description: Decrypted content of the message
        example: This was a secret message
        type: string
      decryptedAt:
        description: When the message was decrypted
        type: string
      expiresAt:
        description: When the message will expire
        type: string
      maxViewCount:
        description: Maximum allowed views for this message
        example: 5
        type: integer
      messageId:
        description: Unique identifier for the message
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      viewCount:
        description: Current number of times the message has been viewed
        example: 1
        type: integer
    type: object
  models.MessageSubmissionRequest:
    properties:
      additionalInfo:
        description: Optional additional information for the recipient
        example: Valid for 24 hours
        type: string
      antiSpamAnswer:
        description: Answer to the anti-spam question (required if notifications enabled)
        example: blue
        type: string
      content:
        description: Secret content to be encrypted
        example: This is a secret message
        maxLength: 10000
        minLength: 1
        type: string
      expirationHours:
        description: |-
          ExpirationHours specifies a custom expiration in hours. When 0 or omitted, the server default (7 days / 168 hours) applies.
          Valid range: 1–2160 (1 hour to 90 days).
        example: 24
        maximum: 2160
        minimum: 0
        type: integer
      maxViewCount:
        description: Maximum number of times the message can be viewed (0 for unlimited)
        example: 1
        maximum: 100
        minimum: 0
        type: integer
      passphrase:
        description: Optional passphrase for additional security
        example: correct-horse-battery-staple
        maxLength: 500
        type: string
      questionId:
        description: ID of the anti-spam question
        example: 0
        type: integer
      recipient:
        allOf:
        - $ref: '#/definitions/models.Recipient'
        description: Recipient information (required if notifications enabled)
      sendNotification:
        description: Whether to send email notifications
        example: true
        type: boolean
      sender:
        allOf:
        - $ref: '#/definitions/models.Sender'
        description: Sender information (required if notifications enabled)
      turnstileToken:
        description: Cloudflare Turnstile token for verification
        maxLength: 2048
        type: string
    required:
    - content
    type: object
  models.MessageSubmissionResponse:
    properties:
      decryptUrl:
        description: API URL to decrypt the message
        example: https://api.password.exchange/api/v1/messages/123e4567-e89b-12d3-a456-426614174000/decrypt?key=YWJjZGVmZ2hpams=
        type: string
      expiresAt:
        description: When the message will expire
        type: string
      key:
        description: Base64 encoded encryption key
        example: YWJjZGVmZ2hpams=
        type: string
      messageId:
        description: Unique identifier for the created message
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      notificationSent:
        description: Whether an email notification was successfully sent
        example: true
        type: boolean
      webUrl:
        description: Web URL for human-friendly access
        example: https://password.exchange/decrypt/123e4567-e89b-12d3-a456-426614174000/YWJjZGVmZ2hpams=
        type: string
    type: object
  models.Recipient:
    properties:
      email:
        description: Recipient's email address
        example: jane@example.com
        type: string
      name:
        description: Recipient's name
        example: Jane Smith
        maxLength: 100
        minLength: 1
        type: string
    required:
    - email
    type: object
  models.Sender:
    properties:
      email:
        description: Sender's email address
        example: john@example.com
        type: string
      name:
        description: Sender's name
        example: John Doe
        maxLength: 100
        minLength: 1
        type: string
    required:
    - email
    - name
    type: object
  models.StandardErrorResponse:
    properties:
      details:
        additionalProperties: true
        type: object
      error:
        type: string
      message:
        type: string
      path:
        type: string
      timestamp:
        type: string
    type: object
host: password.exchange
info:
  contact:
    name: Password Exchange Support
    url: https://github.com/Anthony-Bible/password-exchange
  description: |-
    Secure password sharing service that allows users to submit encrypted messages and share them through unique, one-time access URLs.
    The service provides optional email notifications and passphrase protection for enhanced security.

    ## Email Reminder System

    The service includes an automated email reminder system that runs via scheduled jobs (CronJob in Kubernetes).
    This system automatically sends reminder emails to recipients who haven't viewed their secure messages after
    a configurable time period. The reminder system is not exposed through REST API endpoints but operates as
    a background service with configurable timing, retry logic, and resilience patterns.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Password Exchange API
  version: 1.0.0
paths:
  /health:
    get:
      consumes:
      - application/json
      description: Returns the health status of the API and its dependencies
      produces:
      - application/json
      responses:
        "200":
          description: Service health status
          schema:
            $ref: '#/definitions/models.HealthCheckResponse'
      summary: Health check
      tags:
      - Utility
  /info:
    get:
      consumes:
      - application/json
      description: Returns information about the API including available endpoints
        and features
      produces:
      - application/json
      responses:
        "200":
          description: API information
          schema:
            $ref: '#/definitions/models.APIInfoResponse'
      summary: API information
      tags:
      - Utility
  /messages:
    post:
      consumes:
      - application/json
      description: Creates a new encrypted message that can be accessed via a unique
        URL. Optionally sends email notifications to the recipient.
      parameters:
      - description: Message submission request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.MessageSubmissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Message successfully created
          schema:
            $ref: '#/definitions/models.MessageSubmissionResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
        "422":
          description: Anti-spam verification failed
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
      summary: Submit a new message
      tags:
      - Messages
  /messages/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves information about a message including whether it exists,
        requires a passphrase, and has been accessed.
      parameters:
      - description: Message ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Base64-encoded decryption key
        format: byte
        in: query
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Message information retrieved
          schema:
            $ref: '#/definitions/models.MessageAccessInfoResponse'
        "404":
          description: Message not found or expired
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
      summary: Get message access information
      tags:
      - Messages
  /messages/{id}/decrypt:
    post:
      consumes:
      - application/json
      description: Decrypts and retrieves the message content. This is a one-time
        operation that will delete the message after successful decryption.
      parameters:
      - description: Message ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Decryption request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.MessageDecryptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Message successfully decrypted
          schema:
            $ref: '#/definitions/models.MessageDecryptResponse'
        "401":
          description: Invalid passphrase
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
        "404":
          description: Message not found or expired
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
        "410":
          description: Message already consumed
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.StandardErrorResponse'
      summary: Decrypt a message
      tags:
      - Messages
schemes:
- https
- http
swagger: "2.0"
